<!doctype html>
<html lang="en">
<!--
  login.html – TOTP/WebAuthn authentication page for PiClaw.

  Shown when WEB_TOTP_SECRET is configured. The page shell is static HTML/CSS,
  while behavior is loaded from /static/dist/login.bundle.js.

  Served by: channels/web/auth.ts when the user is not authenticated.
-->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piclaw Login</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: #1f2937;
        --accent: #38bdf8;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #64748b;
          --border: #e2e8f0;
          --accent: #2563eb;
        }
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(92vw, 420px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 18px;
        letter-spacing: 0.18em;
        text-align: center;
      }
      button {
        padding: 12px 16px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
      .error {
        color: #f87171;
        font-size: 13px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Enter your code</h1>
      <p>Use the 6-digit code from your authenticator app.</p>
      <form id="login-form">
        <input
          id="code"
          name="code"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="••••••"
          autofocus
        />
        <button type="submit">Verify</button>
        <div class="error" id="error"></div>
      </form>
    </div>
    <script type="module" src="/static/dist/login.bundle.js?v=1"></script>
  </body>
</html>
